name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing tag to build (e.g. v1.0.2)
        required: true
        default: v1.0.2

permissions:
  contents: write

jobs:
  validate:
    name: Validate (dotnet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Core rules smoke
        run: dotnet run --project Tools/CoreRulesCheck/CoreRulesCheck.csproj

      - name: Level assets sync
        run: |
          dotnet run --project Tools/GenerateLevelAssets/GenerateLevelAssets.csproj
          git diff --exit-code Assets/Resources/Levels/

      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          REF_NAME="${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}"
          TAG_NAME="${REF_NAME#v}"
          PROJECT_VERSION=$(awk '/^  bundleVersion:/{print $2}' ProjectSettings/ProjectSettings.asset)
          VERSION_CODE=$(awk '/^  AndroidBundleVersionCode:/{print $2}' ProjectSettings/ProjectSettings.asset)
          if [[ "$TAG_NAME" != "$PROJECT_VERSION" ]]; then
            echo "Tag version ($TAG_NAME) must match ProjectSettings.bundleVersion ($PROJECT_VERSION)." >&2
            exit 1
          fi
          echo "name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "ref_name=$REF_NAME" >> "$GITHUB_OUTPUT"

  build-android:
    name: Build Android AAB
    needs: validate
    runs-on: [self-hosted, macOS, unity]
    steps:
      - name: Prepare runner PATH
        run: echo "/opt/homebrew/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: |
          REF_NAME="${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}"
          TAG_NAME="${REF_NAME#v}"
          VERSION_CODE=$(awk '/^  AndroidBundleVersionCode:/{print $2}' ProjectSettings/ProjectSettings.asset)
          echo "name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "ref_name=$REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Build signed AAB on local Unity
        env:
          LIGHTHOUSES_VERSION_NAME: ${{ steps.version.outputs.name }}
          LIGHTHOUSES_VERSION_CODE: ${{ steps.version.outputs.code }}
        run: |
          chmod +x Tools/ci/run_github_android_build.sh
          Tools/ci/run_github_android_build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ steps.version.outputs.name }}
          path: Release/Lighthouses-${{ steps.version.outputs.name }}.aab
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: build-android
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release version
        id: version
        run: |
          REF_NAME="${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}"
          echo "name=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "ref_name=$REF_NAME" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          name: android-aab-${{ steps.version.outputs.name }}
          path: Release

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.ref_name }}
          name: Lighthouses ${{ steps.version.outputs.name }}
          generate_release_notes: true
          files: Release/Lighthouses-${{ steps.version.outputs.name }}.aab
