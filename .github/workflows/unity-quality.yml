name: Unity Quality

on:
  pull_request:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      run_unity_tests:
        description: Run Unity EditMode/PlayMode jobs (requires UNITY_LICENSE)
        type: boolean
        default: false

jobs:
  core-rules:
    name: Core rules (dotnet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet run --project Tools/CoreRulesCheck/CoreRulesCheck.csproj

  level-assets:
    name: Level assets sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet run --project Tools/GenerateLevelAssets/GenerateLevelAssets.csproj
      - run: git diff --exit-code Assets/Resources/Levels/

  editmode:
    name: EditMode tests
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_unity_tests }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Unity license secret
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        run: |
          if [[ -z "$UNITY_LICENSE" ]]; then
            echo "::error::Missing UNITY_LICENSE secret. Run Tools/ci/setup-github-secrets.sh"
            exit 1
          fi
      - uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: 6000.3.19f1
          testMode: EditMode
          artifactsPath: artifacts/editmode

  playmode:
    name: PlayMode tests
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_unity_tests }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Unity license secret
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        run: |
          if [[ -z "$UNITY_LICENSE" ]]; then
            echo "::error::Missing UNITY_LICENSE secret. Run Tools/ci/setup-github-secrets.sh"
            exit 1
          fi
      - uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: 6000.3.19f1
          testMode: PlayMode
          artifactsPath: artifacts/playmode
